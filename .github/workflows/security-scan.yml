name: Container Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  scan-vulnerable:
    name: Scan Vulnerable Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build vulnerable image
        run: docker build -f vulnerable/Dockerfile -t lab-vulnerable:latest .

      - name: Run Trivy on vulnerable image (SARIF)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: lab-vulnerable:latest
          format: sarif
          output: reports/trivy-vulnerable.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"   # 취약 이미지는 CI를 실패시키지 않음 (결과 기록 목적)

      - name: Upload vulnerable scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/trivy-vulnerable.sarif
          category: trivy-vulnerable

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerable-sarif
          path: reports/trivy-vulnerable.sarif

  scan-hardened:
    name: Scan Hardened Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build hardened image
        run: docker build -f hardened/Dockerfile -t lab-hardened:latest .

      - name: Run Trivy on hardened image (SARIF)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: lab-hardened:latest
          format: sarif
          output: reports/trivy-hardened.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"   # CRITICAL/HIGH 발견 시 CI 실패

      - name: Upload hardened scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/trivy-hardened.sarif
          category: trivy-hardened

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-hardened-sarif
          path: reports/trivy-hardened.sarif
